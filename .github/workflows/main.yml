name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Check disk space and memory before doing anything
            echo "=== SYSTEM STATUS ==="
            df -h /
            free -h
            
            # --- CODE UPDATE ---
            cd /home/ubuntu/Pathfinder_new_website || exit 1
            echo "=== UPDATING CODEBASE ==="
            git fetch origin main
            git reset --hard origin/main
            
            # --- BACKEND DEPLOYMENT ---
            echo "=== DEPLOYING BACKEND ==="
            cd backend
            if [ ! -f .env ]; then
              echo "⚠️ WARNING: .env file not found in backend directory!"
            fi
            
            # Ensure venv exists and is up to date
            [ -d venv ] || python3 -m venv venv
            source venv/bin/activate
            # Use pip sync/install with cache to speed up
            pip install --no-cache-dir -r requirements.txt
            
            # Restart Gunicorn service
            echo "=== RESTARTING GUNICORN ==="
            sudo systemctl restart gunicorn
            sudo systemctl status gunicorn --no-pager | head -n 10
            
            # --- FRONTEND DEPLOYMENT ---
            echo "=== DEPLOYING FRONTEND ==="
            cd ../frontend
            # Clean up old dependencies caches
            rm -rf node_modules/.cache
            npm ci --prefer-offline || npm install
            
            # Build with optimized memory limit
            export NODE_OPTIONS="--max-old-space-size=2048"
            echo "=== STARTING NPM BUILD ==="
            npm run build
            
            # --- SERVER CONFIGURATION & DEPLOY ---
            echo "=== UPDATING NGINX CONFIGURATION ==="
            # Ensure client_max_body_size is set to 20M (fixes 413 Request Entity Too Large)
            # This updates the main nginx.conf if not already set high
            if ! grep -q "client_max_body_size" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a \    client_max_body_size 20M;' /etc/nginx/nginx.conf
              echo "✅ Added client_max_body_size 20M to nginx.conf"
            else
              sudo sed -i 's/client_max_body_size [0-9]*[a-zA-Z]*;/client_max_body_size 20M;/g' /etc/nginx/nginx.conf
              echo "✅ Updated client_max_body_size to 20M in nginx.conf"
            fi
            
            # Copy built files to Nginx web root
            echo "=== COPYING DIST TO WEB ROOT ==="
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            
            # Reload Nginx to apply changes (reload is zero-downtime, restart is safer for config changes)
            sudo nginx -t && sudo systemctl restart nginx
            
            echo "=== DEPLOYMENT SUCCESSFULLY COMPLETED ==="
